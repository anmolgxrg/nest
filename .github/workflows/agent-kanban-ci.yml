name: Agent Kanban CI

on:
  pull_request:
    paths:
      - ".github/workflows/agent-kanban-ci.yml"
      - "sdk/agent-kanban/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/agent-kanban-ci.yml"
      - "sdk/agent-kanban/**"

jobs:
  build-lint-test:
    name: Build, lint, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/agent-kanban
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: sdk/agent-kanban/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build
